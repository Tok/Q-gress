<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Q-Gress</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="stylesheet/QGress.css">
    <!-- MapLibre GL JS (open-source fork of Mapbox GL; no access token required) -->
    <script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css" rel="stylesheet"/>
    <!-- three.js (UMD global THREE) for the 3D scene rendered as a MapLibre custom layer.
         TODO: migrate to the npm/ESM build (0.160 is the last with a UMD bundle). -->
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
</head>
<body>
<div id="root" style="font-family:'AmarilloUSAF';font-weight:normal;font-size:21px;height:100%"></div>
<div id="initialMap" class="initialMap" style="top:-100%"></div>
<div id="map" class="map" style="top:-100%"></div>
<div id="shadowMap" class="shadowMap" style="top:-100%"></div>
<!-- Kotlin/JS webpack bundle (emitted next to this file by jsBrowserDistribution) -->
<script src="Q-Gress.js"></script>
</body>
</html>
