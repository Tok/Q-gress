<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Q-Gress">
  <!--
    Q-Gress favicon: the iconic control-field triangle (three portals linked into a field).
    Faction-balanced by construction — green (ENL #03DC03) and blue (RES #0088FF) each get
    exactly one half of the field, one link edge, half the base, and one base node. The apex
    node is neutral (XM white). No colour bias.
  -->
  <defs>
    <linearGradient id="qgEnl" x1="32" y1="11" x2="20" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#03DC03" stop-opacity=".08"/>
      <stop offset="1" stop-color="#03DC03" stop-opacity=".5"/>
    </linearGradient>
    <linearGradient id="qgRes" x1="32" y1="11" x2="44" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0088FF" stop-opacity=".08"/>
      <stop offset="1" stop-color="#0088FF" stop-opacity=".5"/>
    </linearGradient>
    <radialGradient id="qgVig" cx="32" cy="28" r="34" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#121a26"/>
      <stop offset="1" stop-color="#080b11"/>
    </radialGradient>
    <filter id="qgGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.05" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- dark sci-fi tile -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#qgVig)"/>
  <rect x="2.5" y="2.5" width="59" height="59" rx="13.5" fill="none" stroke="#222b3b" stroke-width="1"/>

  <!-- control field, split down the centre line for an even faction share -->
  <polygon points="32,11 13,50 32,50" fill="url(#qgEnl)"/>
  <polygon points="32,11 51,50 32,50" fill="url(#qgRes)"/>

  <!-- links: one edge per faction, base halved -->
  <g filter="url(#qgGlow)" fill="none" stroke-linecap="round" stroke-width="2.4">
    <path d="M32 11 L13 50" stroke="#03DC03"/>
    <path d="M13 50 L32 50" stroke="#03DC03"/>
    <path d="M32 11 L51 50" stroke="#0088FF"/>
    <path d="M32 50 L51 50" stroke="#0088FF"/>
  </g>

  <!-- portal nodes: neutral apex, one green + one blue base node -->
  <g filter="url(#qgGlow)">
    <circle cx="32" cy="11" r="3.1" fill="#e9f2ff"/>
    <circle cx="13" cy="50" r="3.7" fill="#03DC03"/>
    <circle cx="51" cy="50" r="3.7" fill="#0088FF"/>
  </g>
  <circle cx="13" cy="50" r="1.5" fill="#e2ffe3"/>
  <circle cx="51" cy="50" r="1.5" fill="#dcefff"/>
  <circle cx="32" cy="11" r="1.3" fill="#ffffff"/>
</svg>
