<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Q-Gress">
  <!--
    Q-Gress favicon: two opposed control fields. Faction-balanced and mirror-symmetric — ENL green
    (#03DC03) is the left field, RES blue (#0088FF) the right, tips meeting in the middle (the
    contested centre). Each field is a single colour: 3 same-colour nodes + 3 same-colour links, so
    no link ever changes faction mid-edge. The triangles point at each other instead of interlocking
    (deliberately NOT a hexagram).
  -->
  <defs>
    <radialGradient id="qgVig" cx="32" cy="30" r="34" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#121a26"/>
      <stop offset="1" stop-color="#080b11"/>
    </radialGradient>
    <filter id="qgGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- dark sci-fi tile -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#qgVig)"/>
  <rect x="2.5" y="2.5" width="59" height="59" rx="13.5" fill="none" stroke="#222b3b" stroke-width="1"/>

  <!-- ENL field (left), pointing right toward the contested centre -->
  <polygon points="11,13 11,51 31,32" fill="#03DC03" fill-opacity=".16"/>
  <!-- RES field (right), pointing left -->
  <polygon points="53,13 53,51 33,32" fill="#0088FF" fill-opacity=".16"/>

  <!-- links: each field stays a single faction colour -->
  <g filter="url(#qgGlow)" fill="none" stroke-linejoin="round" stroke-width="2.4">
    <polygon points="11,13 11,51 31,32" stroke="#03DC03"/>
    <polygon points="53,13 53,51 33,32" stroke="#0088FF"/>
  </g>

  <!-- portal nodes at the six field corners (3 green, 3 blue) -->
  <g filter="url(#qgGlow)">
    <circle cx="11" cy="13" r="3.3" fill="#03DC03"/>
    <circle cx="11" cy="51" r="3.3" fill="#03DC03"/>
    <circle cx="31" cy="32" r="3.3" fill="#03DC03"/>
    <circle cx="53" cy="13" r="3.3" fill="#0088FF"/>
    <circle cx="53" cy="51" r="3.3" fill="#0088FF"/>
    <circle cx="33" cy="32" r="3.3" fill="#0088FF"/>
  </g>
  <g>
    <circle cx="11" cy="13" r="1.3" fill="#e2ffe3"/>
    <circle cx="11" cy="51" r="1.3" fill="#e2ffe3"/>
    <circle cx="31" cy="32" r="1.3" fill="#e2ffe3"/>
    <circle cx="53" cy="13" r="1.3" fill="#dcefff"/>
    <circle cx="53" cy="51" r="1.3" fill="#dcefff"/>
    <circle cx="33" cy="32" r="1.3" fill="#dcefff"/>
  </g>
</svg>
