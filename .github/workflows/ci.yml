name: CI

on:
  push:
  pull_request:

# Allow the deploy job to push to the gh-pages branch.
permissions:
  contents: write

jobs:
  build:
    name: Lint + complexity + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # The Kotlin/JS plugin downloads its own Node for the Mocha runner — no browser needed.
      - name: Quality gate (ktlint + detekt + jsNodeTest)
        run: ./gradlew --no-configuration-cache --console=plain ktlintCheck detekt jsNodeTest

      # Codecov upload is parked until real Kotlin/JS line-coverage exists (Kover is JVM-only — needs
      # the functional-core split; see PLAN.md). Re-add codecov/codecov-action here once a coverage
      # report is produced; the CODECOV_TOKEN secret is already set.

  deploy:
    name: Deploy 3D to GitHub Pages (root)
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build production bundle
        run: ./gradlew --no-configuration-cache --console=plain jsBrowserDistribution

      # Stamp the deployed build's short-sha so the running app can detect a newer deploy (no-store
      # fetch) and offer a reload — matches config.BuildInfo.GIT_SHA (git rev-parse --short).
      - name: Stamp build version
        run: git rev-parse --short HEAD > build/dist/js/productionExecutable/version.txt

      # Publish the 3D bundle to the gh-pages root. keep_files leaves an optional archived 2D site at
      # /2D/ untouched (if you choose to seed one — see docs/RELEASE.md).
      - name: Deploy to gh-pages (root)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/dist/js/productionExecutable
          keep_files: true
